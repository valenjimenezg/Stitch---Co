<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso - Stitch &amp; Co</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b52ff",
                        "background-light": "#f6f5f8",
                        "background-dark": "#160f23",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Navigation Bar -->
<header class="border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">
<div class="flex items-center gap-8">
<div class="flex items-center gap-3">
<div class="text-primary">
<svg class="size-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4H17.3334V17.3334H30.6666V30.6666H44V44H4V4Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Stitch &amp; Co</h2>
</div>
<nav class="hidden md:flex items-center gap-6">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Telas</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Hilos</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Agujas</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Patrones</a>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="hidden sm:flex items-center bg-primary/5 rounded-lg px-3 py-1.5 border border-primary/10">
<span class="material-symbols-outlined text-primary text-xl">search</span>
<input class="bg-transparent border-none focus:ring-0 text-sm w-40 lg:w-64 placeholder:text-slate-400" placeholder="Buscar insumos..." type="text"/>
</div>
<button class="p-2 rounded-lg hover:bg-primary/10 transition-colors text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">shopping_cart</span>
</button>
</div>
</div>
</div>
</header>
<main class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-md">
<!-- Auth Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-primary/5">
<!-- Tab Headers -->
<div class="flex border-b border-primary/10">
<button class="flex-1 py-4 text-sm font-bold border-b-2 border-primary text-primary bg-primary/5">
                        Iniciar Sesión
                    </button>
<button class="flex-1 py-4 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                        Registrarse
                    </button>
</div>
<div class="p-8">
<!-- Login Form (Visible by default) -->
<form class="space-y-6">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-slate-900 dark:text-white">¡Bienvenida de nuevo!</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">Accede a tu cuenta de Stitch &amp; Co</p>
</div>
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Correo Electrónico</label>
<div class="relative">
<input class="block w-full px-4 py-3 rounded-lg border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Contraseña</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<input class="block w-full px-4 py-3 rounded-lg border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400 pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded border-primary/30 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-600 dark:text-slate-400" for="remember">Mantener sesión iniciada</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98]" type="submit">
                            Entrar
                        </button>
</form>
<!-- Social Login Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-primary/10"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-white dark:bg-slate-900 text-slate-500">O continúa con</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 border border-primary/10 rounded-lg hover:bg-primary/5 transition-colors text-slate-700 dark:text-slate-300">
<svg class="size-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 py-2.5 border border-primary/10 rounded-lg hover:bg-primary/5 transition-colors text-slate-700 dark:text-slate-300">
<svg class="size-5 text-[#1877F2]" fill="currentColor" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
                            Facebook
                        </button>
</div>
</div>
</div>
<!-- Registration Tip/Footer -->
<p class="text-center mt-8 text-sm text-slate-600 dark:text-slate-400">
                ¿No tienes una cuenta? <a class="text-primary font-bold hover:underline" href="#">Regístrate ahora</a>
</p>
</div>
</main>
<!-- Visual Accents (Background Decorations) -->
<div class="fixed top-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-20 -right-20 w-96 h-96 bg-primary/10 rounded-full blur-3xl -z-10"></div>
<footer class="max-w-7xl mx-auto px-4 py-8 border-t border-primary/10 text-center text-slate-400 text-xs">
        © 2024 Stitch &amp; Co. Todos los derechos reservados. Diseñado para creadores apasionados.
    </footer>
</body></html>
